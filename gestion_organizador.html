<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Gestion - TournamentHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
        }
        .btn-gestion {
            display: inline-block;
            background-color: #f39c12; /* Color naranja llamativo */
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-gestion:hover {
            background-color: #e67e22;
        }
        .btn-volver {
            display: block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-volver:hover {
            text-decoration: underline;
        }
        hr {
            margin: 20px 0;
            border: 0;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Panel de Gestion</h1>
        <p>Bienvenido, organizador. Aqui puedes administrar las actividades de tus torneos.</p>
        
        <hr>

        <div style="margin-top: 20px;">
            <h3>Participantes y Registros</h3>
            <p>Revisa las solicitudes de los jugadores que quieren apuntarse a los torneos.</p>
            
            <a href="ManageParticipantsServlet" class="btn-gestion">
                Gestionar Participantes Pendientes
            </a>
        </div>

        <hr>
        
        <a href="index.html" class="btn-volver">Volver al Menu Principal</a>
    </div>

</body>
</html>
